<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holdout — Düello daveti</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#080810" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
  <style>
    :root { --bg:#080810; --card:#141424; --lime:#7BF082; --orange:#FF6B35; --text:#EEEEFF; --text2:#7070A0; --border:rgba(255,255,255,.08); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:
        radial-gradient(700px 360px at 50% -10%, rgba(123,240,130,.10), transparent 60%),
        var(--bg);
      color:var(--text); font-family:"Plus Jakarta Sans",system-ui,sans-serif;
      min-height:100vh; min-height:100svh; display:grid; place-items:center; padding:24px; text-align:center;
    }
    .card {
      width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
      border-radius:26px; padding:38px 28px; box-shadow:0 30px 80px -40px rgba(0,0,0,.9);
    }
    .brand { font-family:"Bebas Neue"; font-size:30px; letter-spacing:1.5px; display:flex; gap:8px; justify-content:center; align-items:center; margin-bottom:26px; }
    .swords { font-size:52px; line-height:1; margin-bottom:14px; }
    h1 { font-family:"Bebas Neue"; font-weight:400; font-size:40px; letter-spacing:1px; line-height:1.05; }
    p { color:var(--text2); font-size:16px; line-height:1.6; margin:14px auto 28px; max-width:320px; }
    .btn {
      display:block; width:100%; padding:16px; border-radius:16px; font-weight:700; font-size:17px;
      font-family:inherit; border:0; cursor:pointer; text-decoration:none;
      background:var(--lime); color:#061206; box-shadow:0 0 18px rgba(123,240,130,.3);
    }
    .btn:active { transform:translateY(1px); }
    .alt { display:inline-block; margin-top:18px; color:var(--text2); font-size:14px; text-decoration:none; }
    .alt b { color:var(--lime); }
    .err { color:var(--orange); font-weight:600; }
    .foot { margin-top:22px; font-size:12px; color:#3A3A60; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span>🔥</span> HOLDOUT</div>
    <div class="swords">⚔️</div>
    <h1>Bir düelloya<br />davet edildin</h1>
    <p id="sub">Bir arkadaşın seni Holdout'ta meydan okuyor — alışkanlık düellosu. Kim önce koparırsa kaybeder.</p>

    <a id="open" class="btn" href="#">Uygulamada aç</a>
    <a class="alt" href="../index.html">Uygulaman yok mu? <b>Holdout'u keşfet →</b></a>

    <div class="foot">Bağlantı açılmıyorsa Holdout'u kurup bu sayfaya tekrar dön.</div>
  </div>

  <script>
    (function () {
      var token = new URLSearchParams(location.search).get("t");
      var open = document.getElementById("open");
      if (!token) {
        document.getElementById("sub").innerHTML =
          '<span class="err">Bu davet bağlantısı geçersiz.</span>';
        open.style.display = "none";
        return;
      }
      var appUrl = "holdout://accept/" + encodeURIComponent(token);
      open.setAttribute("href", appUrl);

      // Best-effort silent auto-open (works on many Android browsers).
      try {
        var f = document.createElement("iframe");
        f.style.display = "none";
        f.src = appUrl;
        document.body.appendChild(f);
      } catch (e) {}
      // Reliable path: user taps the button (best on iOS).
    })();
  </script>
</body>
</html>
